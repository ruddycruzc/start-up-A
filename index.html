<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Equipo</title>
</head>
<body>
    <section class="team">
        <div class="team-container">
            <h2 class="section-title">Nuestro equipo</h2>
            <p class="section-subtitle">El corazón detrás de nuestra misión</p>

            <div class="team-grid">
                
                <div class="team-card">
                    <div class="team-img-wrapper">
                        <img src="foto1.jpg" alt="Carla Ruiz - Directora ejecutiva">
                    </div>
                    <div class="info">
                        <h3>Carla Ruiz</h3>
                        <p class="role">Directora ejecutiva</p>
                    </div>
                </div>

                <div class="team-card">    
                    <div class="team-img-wrapper">
                        <img src="foto2.jpg" alt="Pedro Pérez - Gerente comercial">
                    </div>        
                    <div class="info">
                        <h3>Pedro Pérez</h3>
                        <p class="role">Gerente Comercial</p>
                    </div>            
                </div>

                <div class="team-card">
                    <div class="team-img-wrapper">
                         <img src="foto3.jpg" alt="Ana García - Asesora de Belleza">
                    </div>
                    <div class="info">
                        <h3>Ana García</h3>
                        <p class="role">Asesora de Belleza</p>
                    </div>        
                </div>

            </div> </div> </section>
</body>
</html>
