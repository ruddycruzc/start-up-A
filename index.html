<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <!---AQUI VA LA SECCION DE FORMULARIO---->

    <section id="contacto">
      <h2>Únete</h2>

      <p class="form-help">Recibe novedades y promociones exclusivas.</p>

      <form>
        <fieldset>
          <legend>Suscripción</legend>

          <label for="nombre">Nombre *</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            autocomplete="name"
            required
          />

          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
          />

          <button type="submit" aria-label="Enviar formulario de suscripción">
            Quiero unirme
          </button>
        </fieldset>
      </form>
    </section>
  </body>
</html>
